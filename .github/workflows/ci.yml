name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same branch — saves minutes on rapid pushes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  # Force the pipeline into fixtures mode in CI so no live ESPN scrape ever runs.
  COVERDRIVE_USE_FIXTURES: "1"
  # Required by Pydantic Settings — read by src/coverdrive/utils.py.
  COVERDRIVE_S3_ENDPOINT_URL: "http://localhost:9000"
  COVERDRIVE_S3_BUCKET: "coverdrive-test"
  COVERDRIVE_AWS_ACCESS_KEY_ID: "minioadmin"
  COVERDRIVE_AWS_SECRET_ACCESS_KEY: "minioadmin"

jobs:
  lint-and-typecheck:
    name: Lint + typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install project (dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff (format + lint)
        run: |
          ruff format --check .
          ruff check .

      - name: mypy
        run: mypy src/coverdrive

  test:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install project (dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest with coverage
        run: |
          pytest \
            --cov=coverdrive \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=60 \
            -q

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore


