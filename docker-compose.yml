# Local development stack for Coverdrive.
# Brings up MinIO (object storage), Postgres (Airflow metadata), Airflow,
# and the FastAPI serving layer.
#
# After `make up`, run the pipeline stages on the host:
#   make seed && make transform && make quality && make dbt-build
# Or just: make demo

services:
  # ─── Object storage (S3-compatible) ─────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-04-18T19-09-19Z
    container_name: coverdrive-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9100:9000"   # S3 API
      - "9101:9001"   # Web console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Creates the coverdrive bucket on first run. Idempotent.
  minio-init:
    image: minio/mc:RELEASE.2024-04-18T16-45-29Z
    container_name: coverdrive-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/coverdrive;
      mc anonymous set download local/coverdrive;
      echo 'Buckets ready.';
      "

  # ─── Airflow metadata DB ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: coverdrive-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Airflow (standalone: webserver + scheduler in one process) ─────
  airflow:
    image: apache/airflow:2.9.1-python3.11
    container_name: coverdrive-airflow
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
      COVERDRIVE_S3_ENDPOINT: http://minio:9000
      COVERDRIVE_S3_ACCESS_KEY: minioadmin
      COVERDRIVE_S3_SECRET_KEY: minioadmin
      COVERDRIVE_S3_BUCKET: coverdrive
      COVERDRIVE_ENV: local
      _PIP_ADDITIONAL_REQUIREMENTS: >-
        coverdrive @ file:///opt/coverdrive
        dbt-core>=1.7
        dbt-duckdb>=1.7
    ports:
      - "8180:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./dbt:/opt/airflow/dbt
      - ./:/opt/coverdrive
      - airflow-logs:/opt/airflow/logs
    entrypoint:
      - /bin/bash
      - -c
      - |
        set -e
        airflow db migrate
        airflow users create --role Admin --username admin --password admin --email admin@coverdrive.local --firstname admin --lastname admin || true
        airflow scheduler &
        exec airflow webserver

  # ─── FastAPI serving layer ───────────────────────────────────────────
  # Reads from data/warehouse.duckdb (bind-mounted from the host).
  # Starts degraded until `make dbt-build` populates the warehouse.
  api:
    build: .
    container_name: coverdrive-api
    depends_on:
      minio:
        condition: service_healthy
    environment:
      COVERDRIVE_ENV: local
      COVERDRIVE_S3_ENDPOINT: http://minio:9000
      COVERDRIVE_S3_ACCESS_KEY: minioadmin
      COVERDRIVE_S3_SECRET_KEY: minioadmin
      COVERDRIVE_S3_BUCKET: coverdrive
      COVERDRIVE_WAREHOUSE_PATH: /data/warehouse.duckdb
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  minio-data:
  postgres-data:
  airflow-logs:
