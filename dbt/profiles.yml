coverdrive:
  target: dev

  outputs:
    # ─── Local development: DuckDB reading Silver Parquet from MinIO ────
    dev:
      type: duckdb
      path: "{{ env_var('COVERDRIVE_WAREHOUSE_PATH', '../data/warehouse.duckdb') }}"
      schema: main
      extensions:
        - httpfs
        - parquet
      settings:
        s3_endpoint: "{{ env_var('COVERDRIVE_S3_ENDPOINT_HOST', 'localhost:9100') }}"
        s3_access_key_id: "{{ env_var('COVERDRIVE_S3_ACCESS_KEY', 'minioadmin') }}"
        s3_secret_access_key: "{{ env_var('COVERDRIVE_S3_SECRET_KEY', 'minioadmin') }}"
        s3_use_ssl: "{{ env_var('COVERDRIVE_S3_USE_SSL', 'false') }}"
        s3_url_style: "path"
      threads: 4

    # ─── CI: Postgres target for SQL-compatibility testing ──────────────
    ci:
      type: postgres
      host: "{{ env_var('PGHOST', 'localhost') }}"
      port: "{{ env_var('PGPORT', '5432') | as_number }}"
      user: "{{ env_var('PGUSER', 'coverdrive') }}"
      password: "{{ env_var('PGPASSWORD', 'coverdrive') }}"
      dbname: "{{ env_var('PGDATABASE', 'coverdrive') }}"
      schema: main
      threads: 4
