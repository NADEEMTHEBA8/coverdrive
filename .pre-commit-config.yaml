# Run on every commit. Install with `pre-commit install`.
# Run manually: `pre-commit run --all-files`

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: ^dbt/profiles.yml$   # jinja makes it non-strict-yaml
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic>=2.6
          - types-PyYAML
          - types-requests
        files: ^src/

  # sqlfluff requires sqlfluff-templater-dbt to lint dbt macro calls (e.g.
  # {{ compute_pca_batsman(...) }}). Re-enable once dbt templater is wired in.
  # Dropped from CI in ca04682 for the same reason.

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]
        exclude: ^\.env\.example$
